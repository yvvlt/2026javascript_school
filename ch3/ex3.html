<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>시맨틱 태그</h2>
    난이도 <meter value="9" min="1" max="10" low="3" high="8">80%</meter><br />
    자료 업로딩(20%) <progress max="10"></progress>
    <hr />
    <form>
      이름 : <input type="text" placeholder="이름 입력" /><br />
      암호 :
      <input type="password" maxlength="4" placeholder="암호 입력" /><br />
      자소서 : <textarea cols="20" rows="5">이곳에 자기소개서 작성</textarea>
      <br />
      <input type="submit" value="전송" />
      <input type="reset" value="초기화" />
      <br />
      <button type="button">
        이미지 버튼 <img src="media/button.png" alt="버튼" />
      </button>
      <hr />

      <input type="checkbox" name="menu" value="1" />짜장면
      <input type="checkbox" name="menu" value="2" checked /> 짬뽕
      <input type="checkbox" name="menu" value="3" />탕수육

      <hr />
      <input type="radio" name="china" value="1" />짜장면<img
        src="media/jajang.png"
      /><br />
      <input type="radio" name="china" value="2" />짬뽕<img
        src="media/jjambbong.png"
      /><br />
      <input type="radio" name="china" value="3" />탕수육<img
        src="media/tangsuyuk.png"
      /><br />
      <hr />
      상품선택 :
      <select name="product">
        <option value="special_3" selected>선물용 3kg</option>
        <option value="special_5">선물용 5kg</option>
        <option value="family_3">가정용 3kg</option>
        <option value="family_5">가정용 5kg</option>
      </select>

      <hr />
      브라우저 선택 : <input type="text" list="browsers" name="browser" />
      <datalist id="browsers">
        <option value="Chrome"></option>
        <option value="Firefox"></option>
        <option value="Safari"></option>
        <option value="Edge"></option>
      </datalist>
    </form>
  </body>
</html>
